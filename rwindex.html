<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5;url=https://roadwatchero.com">
    <title>Welcome to RoadwatchHero</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: whitesmoke;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .landing-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
        }
        .brand-images {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .brand-images img {
            max-width: 200px;
            height: auto;
            border-radius: 8px;
        }
        @media (min-width: 480px) {
            .brand-images {
                flex-direction: row;
                justify-content: center;
            }
        }
        h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 35px;
            color: #666;
        }
        .action-button {
            display: inline-block;
            background-color: #ff6600;
            color: #ffffff;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .action-button:hover {
            background-color: #e65c00;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="landing-card">
        <div class="brand-images">
            <img src="1000066247_3.jpg" alt="RoadwatchHero Logo">
            <img src="1000066628_2.jpg" alt="Roadwatch Hero Character">
        </div>
        <h1>Welcome to RoadwatchHero</h1>
        <p>You are being redirected to our official site.</p>
        <a href="https://roadwatchero.com" class="action-button">Check it out!</a>
    </div>
</body>
</html>
